<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Prueba Tidio</title>
</head>
<body>
    <h1>Prueba de Tidio</h1>
    <p>Si el chat se cierra al escribir, el problema es del script.</p>
    
    <script src="https://code.tidio.co/l90vdgeb19wyo1hvbhpmzrgfojxhtmqq.js" async></script>
    <script>
        if (window.tidioChatApi) {
            window.tidioChatApi.on('ready', function() {
                console.log('Tidio listo');
            });
            window.tidioChatApi.on('open', function() {
                console.log('Tidio abierto');
            });
            window.tidioChatApi.on('close', function() {
                console.log('Tidio cerrado - posible error');
            });
        }
        
        // Detectar si el iframe desaparece
        setInterval(function() {
            var iframe = document.getElementById('tidio-chat-code') || document.querySelector('iframe[src*="tidio"]');
            if (!iframe) {
                console.warn('Tidio iframe no encontrado - se desmontó');
            }
        }, 2000);
    </script>
</body>
</html>
