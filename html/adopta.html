<script>

    var FILTROS = {
        especie:   'todos',
        urgencia:  'todos',
        ubicacion: 'todos',
        tamano:    'todos',
        edad:      'todos',
        color:     'todos',
        salud:     'todos',
        sexo:      'todos'
    };

    var ETIQUETAS = {
        especie:   { todos:'Todos', perro:'Perros', gato:'Gatos' },
        urgencia:  { todos:'Urgencia', urgente:'Urgente', nuevo:'Nuevo', espera:'Larga espera' },
        ubicacion: { todos:'Ubicación', gijon:'Gijón', oviedo:'Oviedo', aviles:'Avilés' },
        tamano:    { todos:'Tamaño', pequeno:'Pequeño', mediano:'Mediano', grande:'Grande' },
        edad:      { todos:'Edad', cachorro:'Cachorro', joven:'Joven', adulto:'Adulto', senior:'Senior' },
        color:     { todos:'Color', negro:'Negro', blanco:'Blanco', marron:'Marrón', atigrado:'Atigrado', bicolor:'Bicolor' },
        salud:     { todos:'Salud', bueno:'Bueno', especial:'Necesidades especiales' },
        sexo:      { todos:'Sexo', macho:'Macho', hembra:'Hembra' }
    };

    function aplicarFiltros() {
        document.querySelectorAll('.animalCard').forEach(function(card) {
            var ok = (FILTROS.especie   === 'todos' || (card.dataset.especie   || '') === FILTROS.especie)
                  && (FILTROS.urgencia  === 'todos' || (card.dataset.urgencia  || '') === FILTROS.urgencia)
                  && (FILTROS.ubicacion === 'todos' || (card.dataset.ubicacion || '') === FILTROS.ubicacion)
                  && (FILTROS.tamano    === 'todos' || (card.dataset.tamano    || '') === FILTROS.tamano)
                  && (FILTROS.edad      === 'todos' || (card.dataset.edad      || '') === FILTROS.edad)
                  && (FILTROS.color     === 'todos' || (card.dataset.color     || '') === FILTROS.color)
                  && (FILTROS.salud     === 'todos' || (card.dataset.salud     || '') === FILTROS.salud)
                  && (FILTROS.sexo      === 'todos' || (card.dataset.sexo      || '') === FILTROS.sexo);
            card.style.display = ok ? '' : 'none';
        });
        actualizarTags();
        actualizarLimpiar();
    }

    function actualizarTags() {
        var container = document.getElementById('filtro-tags');
        container.innerHTML = '';
        Object.keys(FILTROS).forEach(function(clave) {
            if (FILTROS[clave] === 'todos' || clave === 'especie') return;
            var tag = document.createElement('span');
            tag.className = 'filtro-tag-activo';
            tag.innerHTML = ETIQUETAS[clave][FILTROS[clave]] +
                '<button onclick="quitarFiltro(\'' + clave + '\')" title="Quitar"><i class="fa-solid fa-xmark"></i></button>';
            container.appendChild(tag);
        });
    }

    function actualizarLimpiar() {
        var hayFiltros = Object.keys(FILTROS).some(function(k) { return FILTROS[k] !== 'todos'; });
        document.getElementById('btn-limpiar').style.display = hayFiltros ? '' : 'none';
    }

    function quitarFiltro(clave) {
        FILTROS[clave] = 'todos';
        var el = document.getElementById('filtro-' + clave);
        if (el) el.value = 'todos';
        aplicarFiltros();
    }

    // Imágenes especie
    document.querySelectorAll('.filtro-especie-img').forEach(function(img) {
        img.addEventListener('click', function() {
            document.querySelectorAll('.filtro-especie-img').forEach(function(i) { i.classList.remove('activo'); });
            img.classList.add('activo');
            FILTROS.especie = img.dataset.especie;
            aplicarFiltros();
        });
    });

    // Selects — auto apply
    ['filtro-urgencia','filtro-ubicacion','filtro-tamano','filtro-edad','filtro-color','filtro-salud','filtro-sexo'].forEach(function(id) {
        var el = document.getElementById(id);
        if (!el) return;
        el.addEventListener('change', function() {
            var clave = id.replace('filtro-', '');
            FILTROS[clave] = this.value;
            aplicarFiltros();
        });
    });

    // Más filtros toggle
    document.getElementById('btn-mas-filtros').addEventListener('click', function() {
        var panel = document.getElementById('filtro-extra');
        var abierto = panel.style.display !== 'none';
        panel.style.display = abierto ? 'none' : 'flex';
        this.innerHTML = abierto
            ? '<i class="fa-solid fa-plus me-1"></i>Más filtros'
            : '<i class="fa-solid fa-minus me-1"></i>Menos filtros';
    });

    // Limpiar todos
    document.getElementById('btn-limpiar').addEventListener('click', function() {
        Object.keys(FILTROS).forEach(function(k) { FILTROS[k] = 'todos'; });
        document.querySelectorAll('.filtro-select').forEach(function(s) { s.value = 'todos'; });
        document.querySelectorAll('.filtro-especie-img').forEach(function(i) { i.classList.remove('activo'); });
        document.querySelector('.filtro-especie-img[data-especie="todos"]').classList.add('activo');
        aplicarFiltros();
    });

</script>
