services:
  - type: web
    name: petfamily
    env: docker
    plan: free
    branch: main
    healthCheckPath: /health.php
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASS
        sync: false
